<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo TO DO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="app-container container py-4">
    <section class="card auth-card border-0" id="loadingSection">
      <div class="loading-shell">
        <div class="loading-orb" aria-hidden="true"></div>
        <p class="loading-label">Connecting to service</p>
        <h1>Preparing your workspace</h1>
        <p class="subhead mb-0" id="loadingMessage">Checking API health before opening the login screen...</p>
      </div>
    </section>

    <section class="card auth-card border-0 d-none" id="authSection">
      <h1>minima · todo</h1>
      <p class="subhead mb-4">secure JWT · 15min access token</p>

      <div class="auth-toggle d-flex gap-2 mb-4 border-bottom pb-3">
        <button id="showRegisterBtn" class="btn btn-outline-secondary rounded-pill">register</button>
        <button id="showLoginBtn" class="btn btn-dark rounded-pill">login</button>
      </div>

      <div id="registerForm" class="d-none">
        <div class="mb-3">
          <label for="regUsername" class="form-label">username</label>
          <input type="text" class="form-control" id="regUsername" placeholder="e.g., Roger Claude" autocomplete="off">
        </div>
        <div class="mb-3">
          <label for="regEmail" class="form-label">email</label>
          <input type="email" class="form-control" id="regEmail" placeholder="jd@test.com">
        </div>
        <div class="mb-3">
          <label for="regPassword" class="form-label">password</label>
          <input type="password" class="form-control" id="regPassword" placeholder="pass123">
        </div>
        <button id="doRegisterBtn" class="btn btn-dark rounded-pill px-4">create account -></button>
      </div>

      <div id="loginForm">
        <div class="mb-3">
          <label for="loginUsername" class="form-label">username</label>
          <input type="text" class="form-control" id="loginUsername" placeholder="Roger Claude">
        </div>
        <div class="mb-3">
          <label for="loginPassword" class="form-label">password</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="pass123">
        </div>
        <button id="doLoginBtn" class="btn btn-dark rounded-pill px-4">sign in -></button>
      </div>

      <div id="authMessage" class="message-bar mt-4"></div>
    </section>

    <section id="todoPanel" class="card todo-panel border-0 d-none">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
        <h2 class="mb-0">tasks</h2>
        <button id="logoutBtn" class="btn btn-outline-secondary btn-sm rounded-pill px-3">logout</button>
      </div>

      <div class="d-flex flex-wrap gap-2 mb-3">
        <span class="status-badge" id="userGreeting"></span>
      </div>

      <div class="create-todo-row row g-2 align-items-stretch">
        <div class="col-sm">
          <input type="text" class="form-control" id="newTaskInput" placeholder="write a new task...">
        </div>
        <div class="col-sm-auto">
          <button id="createTodoBtn" class="btn btn-dark w-100 rounded-pill px-4">+ add</button>
        </div>
      </div>

      <div id="todoListContainer" class="mt-4"></div>
      <div id="todoMessage" class="message-bar"></div>
    </section>
  </main>

  <div class="modal fade" id="sessionExpiryModal" tabindex="-1" aria-labelledby="sessionExpiryTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content session-modal">
        <div class="modal-body p-4">
          <h3 id="sessionExpiryTitle" class="session-modal-title">Stay logged in?</h3>
          <p class="session-modal-copy mb-4">
            Your refresh token expired. Sign in again to keep using your account.
          </p>
          <div class="d-flex flex-wrap gap-2 justify-content-end">
            <button type="button" class="btn btn-outline-secondary rounded-pill px-4" id="sessionLogoutBtn">logout</button>
            <button type="button" class="btn btn-dark rounded-pill px-4" id="sessionReloginBtn">login again</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
